version: "0.5"

environment:
  - "ROOT_DIR=${PWD}"
  - "BUILD_DIR=${PWD}/.build"
  - "CONTENT_DIR=${PWD}/.build/content"

processes:
  # 1) One-shot: clone (or reuse) the Hugo theme starter.
  clone-theme:
    command: ./.forgejo/scripts/clone-theme.sh ${FRESH:+--fresh}
    availability:
      restart: "no"

  # 2) Watch + overlay .forgejo/hugo/ on top of .build/.
  copy-overlay:
    command: |
      watchexec \
        --watch .forgejo/hugo \
        --on-busy-update queue \
        --debounce 200ms \
        -- cp -r .forgejo/hugo/. .build/
    depends_on:
      clone-theme:
        condition: process_completed_successfully

  # 3) Watch content and stage into .build/content via pre-content.sh.
  copy-content:
    command: |
      watchexec \
        --watch . \
        --ignore '.build/**' \
        --ignore '.forgejo/**' \
        --ignore '.git/**' \
        --ignore 'node_modules/**' \
        --on-busy-update queue \
        --debounce 300ms \
        -- ./.forgejo/scripts/pre-content.sh
    depends_on:
      clone-theme:
        condition: process_completed_successfully

  # 4) Hugo dev server (its own --watch picks up changes inside .build/).
  hugo-serve:
    command: |
      hugo serve \
        --buildDrafts \
        --buildExpired \
        --buildFuture \
        --contentDir=.build/content \
        --source=.build \
        --watch
    depends_on:
      copy-overlay:
        condition: process_started
      copy-content:
        condition: process_started
    availability:
      restart: on_failure