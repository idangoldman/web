name: Set Version

on:
  workflow_dispatch:

jobs:
  set-version:
    runs-on: ubuntu
    steps:
      - name: Set Version
        run: |
          VERSION=$(date -u +%Y%m%d-%H.%M.%S)
          echo "SITE_VERSION=$VERSION" >> $FORGEJO_ENV
          echo $VERSION

      - name: TZ sanity check
        run: |
          echo "TZ env: $TZ"
          echo "localtime: $(readlink -f /etc/localtime 2>/dev/null || ls -la /etc/localtime)"
          echo "timezone file: $(cat /etc/timezone 2>/dev/null || echo 'missing')"
          cat /etc/localtime | head -c 4
          date
          date -u
