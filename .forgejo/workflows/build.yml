name: Build and Package

on:
  workflow_dispatch:

  push:
    branches:
      - main

env:
  QUARTZ_VERSION: v4.5.0
  QUARTZ_DIR: .quartz-build

jobs:
  build:
    runs-on: ubuntu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for tagging
          # token: ${{ secrets.ACTION_RUNNER_TOKEN }} # ${{ secrets.FORGEJO_PAT }}

      - name: Set up Quartz
        run: |
          mkdir -p ${QUARTZ_DIR}
          git clone --depth=1 --branch ${QUARTZ_VERSION} https://github.com/jackyzha0/quartz.git ${QUARTZ_DIR}
          cd ${QUARTZ_DIR} && npm ci

      - name: Copy Custom Files
        run: |
          # Copy any custom files needed for the build
          cp -r .forgejo/quartz/* ${QUARTZ_DIR}/

      - name: Set version
        id: v
        run: echo "value=$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and Package
        working-directory: ${QUARTZ_DIR}
        run: |
          npx quartz build --directory ../ --output public
          zip -r site-${{ steps.v.outputs.value }}.zip public

      # - name: Upload to Forgejo packages
