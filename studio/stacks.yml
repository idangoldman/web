# Schema per item:
#   name      (required)  canonical clean name; unique join key for lists
#   note      (optional)  freeform text, for my future self and anyone else who finds this — add context, links, whatever.
#   project   (optional)  name of project from projects.yml, if applicable — join for cross-referencing.
#   status    (optional)  current | retired | planned — heuristic, for sorting and filtering
#   toolbox   (required)  list of tools used in this stack — join by name to toolbox.yml, for easy lookup and cross-referencing.

